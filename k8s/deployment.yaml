apiVersion: apps/v1
kind: Deployment
metadata:
  name: yasssf-frontend
  labels:
    app: yasssf-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yasssf-frontend
  template:
    metadata:
      labels:
        app: yasssf-frontend
    spec:
      containers:
        - name: yasssf-frontend
          image: yasssf-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: 'production'
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '250m'
              memory: '256Mi'
