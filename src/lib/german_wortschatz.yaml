- indication: (sich) zu|muten (*So eine anstrengende Tour will ich mir nicht zumuten.*)
  result: to expect too much of oneself / to subject oneself to (I don't want to subject
    myself to such a strenuous tour.)
- indication: die Konsequenz, -en
  result: consequence
- indication: die Überforderung, -en
  result: excessive demand / strain / being overwhelmed
- indication: die Erschöpfung (Sg.)
  result: exhaustion / fatigue
- indication: die Ambition, -en (*sportliche Ambitionen haben*)
  result: ambition (to have athletic ambitions)
- indication: nach|vollziehen (*vollzieht nach, vollzog nach, hat nachvollzogen*)
  result: to comprehend / to trace / to understand
- indication: '*Weitere Wörter, die für mich wichtig sind'
  result: '*Other words that are important to me'
- indication: '*Wortfamilien – Notieren Sie weitere Wörter mit dem markierten Wortstamm.'
  result: '*Word families – Note down other words with the marked word stem.'
